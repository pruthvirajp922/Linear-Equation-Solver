<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Equation Solver Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --card-bg: rgba(22, 28, 45, 0.45);
            --input-bg: rgba(13, 17, 28, 0.75);
            --text-main: #ffffff;
            --text-muted: #94a3b8; 
            --border-color: rgba(255, 255, 255, 0.12);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f4c81 0%, #1e1b4b 40%, #4c1d95 100%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            max-width: 620px;
            width: 100%;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-size: 2.1rem;
            margin-top: 0;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .equation-box {
            background: var(--input-bg);
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .equation-box:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .eq-label {
            font-size: 0.8rem;
            color: #38bdf8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .manual-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 600;
            padding: 4px 0;
            font-family: inherit;
        }

        .manual-input::placeholder {
            color: rgba(148, 163, 184, 0.45);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
            filter: brightness(1.08);
        }

        .syntax-guide {
            background-color: rgba(13, 17, 28, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .syntax-title {
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        #result {
            margin-top: 20px;
            padding: 18px;
            border-radius: 16px;
            display: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.8;
        }

        .success {
            background-color: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
            text-align: left !important;
            padding-left: 24px !important;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 1rem;
            color: #94a3b8;
        }

        /* Matches your name perfectly with the vibrant UI button gradient */
        .footer-name {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            display: inline-block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 16px;
            }
            h2 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Equation Solver Pro</h2>
    <p class="subtitle">Supports System, Quadratics & Non-Linear Products</p>

    <div class="equation-box">
        <div class="eq-label">Equation 1</div>
        <input type="text" id="eq1" class="manual-input" placeholder="e.g., 7x - 2y = 5xy" value="7x - 2y = 5xy">
    </div>

    <div class="equation-box">
        <div class="eq-label">Equation 2</div>
        <input type="text" id="eq2" class="manual-input" placeholder="e.g., 8x + 7y = 15xy" value="8x + 7y = 15xy">
    </div>

    <button onclick="processSystem()">Solve System</button>

    <div id="result"></div>

    <div class="syntax-guide">
        <div class="syntax-title">💡 Supported Expression Guide:</div>
        • <strong>System with products:</strong> <code style="color: #38bdf8;">7x - 2y = 5xy</code><br>
        • <strong>Powers & Fractions:</strong> <code style="color: #38bdf8;">x^2 + 1/2*y = 5</code> or <code style="color: #38bdf8;">y^3 - 9 = 0</code><br>
        • <strong>Standard Forms:</strong> <code style="color: #38bdf8;">3x + 2y = 5/2</code>
    </div>

    <div class="footer">
        Made by <span class="footer-name">Pruthviraj Patil</span>
    </div>
</div>

<script>
function formatAsFraction(decimalVal) {
    if (Math.abs(decimalVal) < 1e-7) return "0";
    if (Math.abs(decimalVal - Math.round(decimalVal)) < 1e-7) return `${Math.round(decimalVal)}`;
    
    let sign = decimalVal < 0 ? "-" : "";
    let val = Math.abs(decimalVal);
    
    let h1 = 1, h2 = 0, k1 = 0, k2 = 1;
    let b = val;
    do {
        let a = Math.floor(b);
        let aux = h1; h1 = a * h1 + h2; h2 = aux;
        aux = k1; k1 = a * k1 + k2; k2 = aux;
        b = 1 / (b - a);
        if (k1 > 10000) break;
    } while (Math.abs(val - h1 / k1) > 1e-7);
    
    if (k1 === 1) return `${sign}${h1}`;
    return `${sign}${h1}/${k1}`;
}

function normalizeEquationString(str) {
    let parts = str.split('=');
    if (parts.length !== 2) return null;
    
    let left = parts[0].trim();
    let right = parts[1].trim();
    
    function addImplicitMultiplication(expr) {
        return expr
            .replace(/([0-9]+)([a-zA-Z])/g, '$1*$2')
            .replace(/([a-zA-Z])([a-zA-Z])/g, '$1*$2');
    }
    
    return `${addImplicitMultiplication(left)} - (${addImplicitMultiplication(right)})`;
}

function processSystem() {
    const rawEq1 = document.getElementById('eq1').value;
    const rawEq2 = document.getElementById('eq2').value;
    const resultDiv = document.getElementById('result');
    
    resultDiv.style.display = "block";
    
    const parsedEq1 = normalizeEquationString(rawEq1);
    const parsedEq2 = normalizeEquationString(rawEq2);
    
    if (!parsedEq1 || !parsedEq2) {
        resultDiv.className = "error";
        resultDiv.innerHTML = "⚠️ Invalid syntax. Ensure both equations have a single '=' sign.";
        return;
    }

    try {
        const code1 = math.compile(parsedEq1);
        const code2 = math.compile(parsedEq2);
        
        function solveNewtonRaphson() {
            let solutions = [];
            let seeds = [[1, 1], [-1, -1], [2, 0.5], [0.1, 0.1], [-2, 3], [5, 5]];
            
            for (let seed of seeds) {
                let x = seed[0];
                let y = seed[1];
                let converged = false;
                
                for (let i = 0; i < 100; i++) {
                    let f1 = code1.evaluate({x: x, y: y});
                    let f2 = code2.evaluate({x: x, y: y});
                    
                    if (Math.abs(f1) < 1e-10 && Math.abs(f2) < 1e-10) {
                        converged = true;
                        break;
                    }
                    
                    let h = 1e-6;
                    let df1_dx = (code1.evaluate({x: x + h, y: y}) - f1) / h;
                    let df1_dy = (code1.evaluate({x: x, y: y + h}) - f1) / h;
                    let df2_dx = (code2.evaluate({x: x + h, y: y}) - f2) / h;
                    let df2_dy = (code2.evaluate({x: x, y: y + h}) - f2) / h;
                    
                    let det = df1_dx * df2_dy - df1_dy * df2_dx;
                    if (Math.abs(det) < 1e-12) break;
                    
                    x = x - (f1 * df2_dy - f2 * df1_dy) / det;
                    y = y - (df1_dx * f2 - df2_dx * f1) / det;
                }
                
                if (converged && !isNaN(x) && !isNaN(y)) {
                    let duplicate = false;
                    for (let sol of solutions) {
                        if (Math.abs(sol.x - x) < 1e-4 && Math.abs(sol.y - y) < 1e-4) {
                            duplicate = true;
                            break;
                        }
                    }
                    if (!duplicate) {
                        solutions.push({x: x, y: y});
                    }
                }
            }
            return solutions;
        }

        let solutions = solveNewtonRaphson();
        
        if (solutions.length === 0) {
            resultDiv.className = "error";
            resultDiv.innerHTML = "<strong>No Real Solutions Found</strong><br>Check values or equation structural boundary limits.";
        } else {
            resultDiv.className = "success";
            let outHTML = `✨ <strong>Solution(s) Found:</strong><br><hr style='border:0; border-top:1px solid rgba(255,255,255,0.1); margin:10px 0;'>`;
            solutions.forEach((sol, idx) => {
                let displayX = formatAsFraction(sol.x);
                let displayY = formatAsFraction(sol.y);
                
                if (displayX.includes("/") && displayX.length > 9) displayX = sol.x.toFixed(4);
                if (displayY.includes("/") && displayY.length > 9) displayY = sol.y.toFixed(4);

                outHTML += `<div style='margin-bottom:12px;'><strong>Set ${idx + 1}:</strong><br>x = ${displayX}<br>y = ${displayY}</div>`;
            });
            resultDiv.innerHTML = outHTML;
        }

    } catch (err) {
        resultDiv.className = "error";
        resultDiv.innerHTML = "⚠️ <strong>Math Processing Error</strong><br>Verify your variables match (use x and y) and check operators.";
    }
}
</script>

</body>
</html>
